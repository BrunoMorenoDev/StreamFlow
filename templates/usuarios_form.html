<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Formulario Usuario | StreamFlow</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-slate-950 text-white min-h-screen">

    <main class="max-w-3xl mx-auto px-6 py-10">

        <div class="mb-8">
            <a href="{% url 'usuarios_listar' %}" class="text-cyan-400 hover:underline">
                ← Volver a usuarios
            </a>

            <h1 class="text-4xl font-bold mt-6">
                {% if usuario %}
                    Editar usuario
                {% else %}
                    Crear usuario
                {% endif %}
            </h1>
        </div>

        <form method="POST" class="bg-slate-900 border border-slate-800 rounded-2xl p-8 space-y-6">
            {% csrf_token %}

            <div>
                <label class="block mb-2 text-slate-300">Nombre</label>
                <input type="text" name="nombre" required
                       value="{{ usuario.nombre|default:'' }}"
                       class="w-full bg-slate-800 border border-slate-700 rounded-xl px-4 py-3">
            </div>

            <div>
                <label class="block mb-2 text-slate-300">Email</label>
                <input type="email" name="email" required
                       value="{{ usuario.email|default:'' }}"
                       class="w-full bg-slate-800 border border-slate-700 rounded-xl px-4 py-3">
            </div>

            <div>
                <label class="block mb-2 text-slate-300">Contraseña</label>
                <input type="text" name="contrasena" required
                       value="{{ usuario.contrasena|default:'' }}"
                       class="w-full bg-slate-800 border border-slate-700 rounded-xl px-4 py-3">
            </div>

            <div>
                <label class="block mb-2 text-slate-300">Tipo de usuario</label>
                <select name="tipo" required
                        class="w-full bg-slate-800 border border-slate-700 rounded-xl px-4 py-3">
                    <option value="Free" {% if usuario.tipo == "Free" %}selected{% endif %}>Free</option>
                    <option value="Premium" {% if usuario.tipo == "Premium" %}selected{% endif %}>Premium</option>
                    <option value="Administrador" {% if usuario.tipo == "Administrador" %}selected{% endif %}>Administrador</option>
                    <option value="Artista" {% if usuario.tipo == "Artista" %}selected{% endif %}>Artista</option>
                    <option value="GestorContenido" {% if usuario.tipo == "GestorContenido" %}selected{% endif %}>GestorContenido</option>
                </select>
            </div>

            {% if usuario %}
            <div>
                <label class="block mb-2 text-slate-300">Estado</label>
                <select name="estado" required
                        class="w-full bg-slate-800 border border-slate-700 rounded-xl px-4 py-3">
                    <option value="Activo" {% if usuario.estado == "Activo" %}selected{% endif %}>Activo</option>
                    <option value="Inactivo" {% if usuario.estado == "Inactivo" %}selected{% endif %}>Inactivo</option>
                </select>
            </div>
            {% endif %}

            <button type="submit"
                    class="w-full bg-cyan-500 hover:bg-cyan-600 px-6 py-3 rounded-xl font-semibold">
                Guardar usuario
            </button>
        </form>

    </main>

</body>
</html>
