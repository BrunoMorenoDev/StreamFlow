<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Formulario Artista | StreamFlow</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-slate-950 text-white min-h-screen">

    <main class="max-w-3xl mx-auto px-6 py-10">

        <div class="mb-8">

            <a href="{% url 'artistas_listar' %}"
               class="text-cyan-400 hover:underline">
                ← Volver a artistas
            </a>

            <h1 class="text-4xl font-bold mt-6">

                {% if artista %}
                    Editar artista
                {% else %}
                    Crear artista
                {% endif %}

            </h1>

        </div>

        <form method="POST"
              class="bg-slate-900 border border-slate-800 rounded-2xl p-8 space-y-6">

            {% csrf_token %}

            <div>

                <label class="block mb-2 text-slate-300">
                    Nombre artístico
                </label>

                <input type="text"
                       name="nombre"
                       required
                       value="{{ artista.nombre|default:'' }}"
                       class="w-full bg-slate-800 border border-slate-700 rounded-xl px-4 py-3">

            </div>

            <div>

                <label class="block mb-2 text-slate-300">
                    Biografía
                </label>

                <textarea
                    name="biografia"
                    rows="5"
                    class="w-full bg-slate-800 border border-slate-700 rounded-xl px-4 py-3">{{ artista.biografia|default:'' }}</textarea>

            </div>

            <div>

                <label class="block mb-2 text-slate-300">
                    País
                </label>

                <input type="text"
                       name="pais"
                       required
                       value="{{ artista.pais|default:'' }}"
                       class="w-full bg-slate-800 border border-slate-700 rounded-xl px-4 py-3">

            </div>

            <div>

                <label class="block mb-2 text-slate-300">
                    Discográfica
                </label>

                <select name="discografica"
                        required
                        class="w-full bg-slate-800 border border-slate-700 rounded-xl px-4 py-3">

                    {% for discografica in discograficas %}

                    <option value="{{ discografica.id }}"

                        {% if artista.discografica == discografica.id %}
                            selected
                        {% endif %}>

                        {{ discografica.nombre }}

                    </option>

                    {% endfor %}

                </select>

            </div>

            <div>

                <label class="block mb-2 text-slate-300">
                    Estado
                </label>

                <select name="estado"
                        class="w-full bg-slate-800 border border-slate-700 rounded-xl px-4 py-3">

                    <option value="Activo"
                        {% if artista.estado == "Activo" %}
                            selected
                        {% endif %}>
                        Activo
                    </option>

                    <option value="Inactivo"
                        {% if artista.estado == "Inactivo" %}
                            selected
                        {% endif %}>
                        Inactivo
                    </option>

                </select>

            </div>

            <button type="submit"
                    class="w-full bg-cyan-500 hover:bg-cyan-600 px-6 py-3 rounded-xl font-semibold">

                Guardar artista

            </button>

        </form>

    </main>

</body>

</html>
